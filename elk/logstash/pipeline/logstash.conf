input {
  syslog {
    port => 5000
  }
}

filter {
  # Logspout syslog zarfından gerçek container mesajını çıkar.
  grok {
    match => {
      "message" => "^<%{NONNEGINT:syslog_pri}>1 %{TIMESTAMP_ISO8601:syslog_ts} %{HOSTNAME:docker_host} %{DATA:container_name} %{DATA:container_pid} - - %{GREEDYDATA:container_message}$"
    }
    tag_on_failure => ["_container_message_parse_failure"]
  }

  # Log kaynağına göre parse edilecek payload'ı seç.
  mutate {
    add_field => { "log_payload" => "%{message}" }
  }

  if [container_message] {
    mutate {
      replace => { "log_payload" => "%{container_message}" }
    }
  }

  # structlog JSON satırlarını parse edip alanlara aç.
  if [log_payload] =~ "^\s*\{.*\}\s*$" {
    json {
      source => "log_payload"
      target => "app"
      tag_on_failure => ["_structlog_json_parse_failure"]
    }

    if [app][timestamp] {
      date {
        match => ["[app][timestamp]", "ISO8601"]
        target => "@timestamp"
      }
    }

    mutate {
      rename => {
        "[app][level]" => "[log][level]"
      }
    }

    if ![app][error] and [app][exception] {
      mutate {
        copy => {
          "[app][exception]" => "[app][error]"
        }
      }
    }

    if [app][event] {
      mutate {
        rename => {
          "[app][event]" => "[app][event_name]"
        }
      }
    }

    if [container_name] {
      mutate {
        add_field => {
          "[service][name]" => "%{container_name}"
        }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ai-commerce-logs-%{+YYYY.MM.dd}"
  }
}
